// ===== API =====
async function fetchBoard(code){const u='https://push2.eastmoney.com/api/qt/clist/get?fid=f3&po=1&pz=200&pn=1&np=1&fltt=2&invt=2&fs=b:'+code+'&fields=f2,f3,f12,f14';try{const r=await fetch(u,{mode:'cors'});if(!r.ok)return null;const d=await r.json();if(d?.data?.diff)return d.data.diff.map(i=>({c:i.f12,n:i.f14,p:parseFloat(i.f2||0),ch:parseFloat(i.f3||0)}))}catch(e){}return null;}

async function fetchStockQuote(codes){
  const secids=codes.map(c=>(c.startsWith('6')?'1.'+c:'0.'+c)).join(',');
  const u='https://push2.eastmoney.com/api/qt/ulist.np/get?fltt=2&invt=2&fields=f2,f3,f12,f14&secids='+secids;
  try{const r=await fetch(u,{mode:'cors'});if(!r.ok)return[];const d=await r.json();if(d?.data?.diff)return d.data.diff.map(i=>({c:i.f12,n:i.f14,p:parseFloat(i.f2||0),ch:parseFloat(i.f3||0)}));}catch(e){}return[];
}

  S.scan++;const el=document.getElementById('sc'),st=document.getElementById('st'),si=document.getElementById('si');
  el.textContent='第'+S.scan+'轮 · '+new Date().toLocaleTimeString('zh-CN',{timeZone:'Asia/Shanghai',hour12:false});
  st.textContent='⏳ 扫描中...';st.className='status';
  
  // === 第1步：扫描所有概念板块，收集所有个股 ===
  si.textContent='扫描板块...';
  const boardResults=[];
  for(let i=0;i<BOARDS.length;i+=8){
    const batch=BOARDS.slice(i,i+8);
    const ps=batch.map(async code=>{
      const cons=await fetchBoard(code);
      if(!cons||!cons.length)return null;
      const name=NAMES[code]||code;
      return{code,name,cons};
    });
    const br=await Promise.all(ps);boardResults.push(...br.filter(Boolean));
    si.textContent=Math.min(i+8,BOARDS.length)+'/'+BOARDS.length+'板块';
  }
  
  // === 第2步：从每个板块中只取大涨个股(涨幅>3%)，用修正库重新归属概念 ===
  const conceptMap={}; // {conceptName: {stocks:[], change_sum:0, limit_up:0}}
  const seen=new Set(); // 同一只股票不重复计入
  
  for(const br of boardResults){
    for(const s of br.cons){
      if(s.ch<3||seen.has(s.c))continue; // 只取涨幅>3%的个股，去重
      seen.add(s.c);
      
      // 用修正库获取真实概念，没有则用板块名
      const realConcept=STOCK_CONCEPT_CORRECT[s.c]||br.name;
      
      if(!conceptMap[realConcept])conceptMap[realConcept]={stocks:[],change_sum:0,limit_up:0,code:realConcept,name:realConcept};
      conceptMap[realConcept].stocks.push(s);
      conceptMap[realConcept].change_sum+=s.ch;
      if(s.ch>=9.5)conceptMap[realConcept].limit_up++;
    }
  }
  si.textContent=seen.size+'只大涨股';
  
  // === 第3步：聚合概念，计算均涨幅 ===
  const valid=[];
  for(const[cn,cd]of Object.entries(conceptMap)){
    if(cd.stocks.length<2)continue; // 至少2只大涨股才构成概念
    cd.change_pct=cd.change_sum/cd.stocks.length;
    cd.total=cd.stocks.length;
    valid.push(cd);
  }
  
  // === 第4步：补充新概念（东方财富没有的7个概念）===
  for(const[nc,nd]of Object.entries(NEW_CONCEPTS)){

    const qs=await fetchStockQuote(nd.stocks);

    const risingStocks=qs.filter(s=>s.ch>3);

    const avg=risingStocks.reduce((s,x)=>s+x.ch,0)/risingStocks.length;

  for(const b of valid){
    const g=boardGroup(b.name);
    if(!seenG.has(g)){seenG.add(g);deduped.push(b);if(deduped.length>=20)break;}
  }
  
  // === 第6步：异动打分 ===
  const alerts=[];
  for(const b of deduped){
    let score=0;const reasons=[];
    const p=b.change_pct,lu=b.limit_up;
    if(p>=5){score+=50;reasons.push('+'+p.toFixed(1)+'%')}
    else if(p>=3){score+=35;reasons.push('+'+p.toFixed(1)+'%')}
    else if(p>=2)score+=20;
    const prev=S.prev[b.code];
    if(prev&&p-prev>1.5){score+=35;reasons.push('急拉')}
    if(lu>=5){score+=50;reasons.push(lu+'只涨停')}
    else if(lu>=3){score+=35;reasons.push(lu+'只涨停')}
    S.prev[b.code]=p;
    let lv='none';
    if(score>=85)lv='strong';
    else if(score>=55)lv='medium';
    else if(score>=30)lv='weak';
    if(lv!=='none'){
      const tops=(b.stocks||[]).sort((a,b)=>b.ch-a.ch).slice(0,5);
      alerts.push({...b,score,lv,reasons,time:new Date().toLocaleTimeString('zh-CN',{hour12:false}),catalyst:b.catalyst||getCatalyst(b.name),topStocks:tops});
    }
  }
  S.alerts=alerts.sort((a,b)=>b.score-a.score);
  renderAlerts();
  
  // === 第7步：低位挖掘 ===
  const toMine=alerts.filter(a=>a.lv==='strong'||a.lv==='medium');
  for(const a of toMine.slice(0,3)){
    const last=S.mined.find(m=>m.code===a.code);
    if(last&&Date.now()-last._ts<600000)continue;
    const keywords=getKeywords(a.name),stocks=mineLow(a,keywords);
    S.mined.unshift({...a,keywords,stocks,_ts:Date.now()});
    if(S.mined.length>20)S.mined.pop();
    renderMining();
    if(stocks.length)toast('✅ 挖掘: '+stocks.length+'只低位标的','mining');
  }
  
  const trading=isTrading();
  st.textContent=trading?'● 交易中':'○ 盘后';
  st.className='status '+(trading?'live':'dead');
  si.textContent=valid.length+'概念 · '+alerts.length+'异动 · '+seen.size+'只大涨股';
  const strong=alerts.filter(a=>a.lv==='strong');
  if(strong.length)toast('🔴 '+strong[0].name+' +'+strong[0].change_pct.toFixed(1)+'%','strong');
}

function mineLow(board,keywords){
  const stocks=board.stocks||[],avg=board.change_pct;
  const seen=new Set(),results=[];
  // 第一优先：从MINE库中取深度挖掘标的
  for(const kw of keywords){
    const mstocks=MINE[kw]||[];
    for(const s of mstocks){
      if(!seen.has(s.c)&&results.length<10){results.push({c:s.c,n:s.n,ch:0,src:'纯正·'+kw,logic:s.r});seen.add(s.c);}
    }
  }
  // 第二优先：概念内涨幅低于均值的低位股
  const low=stocks.filter(c=>c.ch<9.5&&c.ch<avg&&!/ST/.test(c.n)).sort((a,b)=>a.ch-b.ch);
  for(const s of low){
    if(!seen.has(s.c)&&results.length<10){
      seen.add(s.c);
      let detail='';
      for(const kw of keywords){const mstocks=MINE[kw]||[];const found=mstocks.find(x=>x.c===s.c);if(found){detail=found.r;break;}}
      if(detail){results.push({c:s.c,n:s.n,ch:s.ch,src:'概念内低位',logic:detail});}
      else{const gap=(avg-s.ch).toFixed(1);results.push({c:s.c,n:s.n,ch:s.ch,src:'概念内低位',logic:'涨幅仅'+s.ch.toFixed(1)+'%，低于概念均值'+avg.toFixed(1)+'%约'+gap+'个百分点，补涨空间明确。'});}
    }
  }
  return results.slice(0,10);
}

function isTrading(){const n=new Date();const bj=new Date(n.toLocaleString('en-US',{timeZone:'Asia/Shanghai'}));const t=bj.getHours()*60+bj.getMinutes();return bj.getDay()>=1&&bj.getDay()<=5&&((t>=540&&t<=690)||(t>=780&&t<=900))}

function renderAlerts(){const el=document.getElementById('al');document.getElementById('ab').textContent=S.alerts.length;if(!S.alerts.length){el.innerHTML='<div class="emp"><div class="ei">👀</div><p>暂无显著异动</p></div>';return}el.innerHTML=S.alerts.map(a=>{const tops=a.topStocks||[];return'<div class="acard '+(a.lv==='strong'?'s':a.lv==='medium'?'m':'w')+'"><div class="bn">'+(a.lv==='strong'?'🔴':a.lv==='medium'?'🟡':'🟢')+' '+a.name+'</div><div class="st"><span>涨幅 <span class="sv up">+'+a.change_pct.toFixed(1)+'%</span></span><span>涨停 <span class="sv">'+a.limit_up+'</span>只</span><span>成分 <span class="sv">'+a.total+'</span>只</span><span>得分 <span class="sv">'+a.score+'</span></span></div>'+(a.catalyst?'<div class="reason">'+a.catalyst+'</div>':'')+(tops.length?'<div style="font-size:11px;color:var(--t2);margin-top:6px;line-height:1.6">🔥 领涨：'+tops.map(s=>'<span style="color:'+(s.ch>=9.5?'var(--r)':'var(--t)')+';font-weight:600">'+s.n+'</span><span style="color:'+(s.ch>=0?'var(--r)':'var(--g)')+'">'+(s.ch>=0?'+':'')+s.ch.toFixed(1)+'%</span>').join(' | ')+'</div>':'')+'<div class="ts">'+a.time+'</div></div>'}).join('');}

function renderMining(){const el=document.getElementById('mr'),bd=document.getElementById('mb');if(!S.mined.length){el.innerHTML='<div class="emp"><div class="ei">🎯</div><p>异动触发后自动挖掘</p></div>';bd.style.display='none';return}bd.style.display='';bd.textContent=S.mined.length;el.innerHTML=S.mined.map(m=>{const tops=m.topStocks||[];return'<div class="mblock"><div class="bt">💎 '+m.name+' <span style="color:var(--r);font-size:14px">+'+m.change_pct.toFixed(1)+'%</span></div><div class="bm">'+m.time+' | '+m.lv+' | '+m.total+'只成分股 | '+m.limit_up+'只涨停</div>'+(m.catalyst?'<div class="catalyst">'+m.catalyst+'</div>':'')+(tops.length?'<div style="font-size:11px;color:var(--t2);margin-bottom:8px;line-height:1.6">🔥 领涨龙头：'+tops.map(s=>'<span style="color:'+(s.ch>=9.5?'var(--r)':'var(--t)')+';font-weight:600">'+s.n+'</span><span style="color:'+(s.ch>=0?'var(--r)':'var(--g)')+'">'+(s.ch>=0?'+':'')+s.ch.toFixed(1)+'%</span>').join(' | ')+'</div>':'')+(m.keywords?.length?'<div class="ctags">🔥 炒作关键词：'+m.keywords.map(c=>'<span class="ctag">'+c+'</span>').join(' ')+'</div>':'')+'<div class="summary">📌 概念「'+m.name+'」均涨幅+'+m.change_pct.toFixed(1)+'%，'+m.limit_up+'只涨停。挖掘'+m.stocks.length+'只低位纯正标的。</div>'+(m.stocks?.length?'<table class="tbl"><thead><tr><th>股票</th><th>来源</th><th>逻辑</th></tr></thead><tbody>'+m.stocks.map(s=>'<tr><td><span class="sn">'+s.n+'</span><span class="sc">'+s.c+'</span>'+(s.ch?'<span class="ch '+(s.ch>0?'up':'down')+'">'+(s.ch>0?'+':'')+s.ch+'%</span>':'')+'</td><td><span class="stag">'+(s.src||'概念')+'</span></td><td class="lc">'+(s.logic||'-')+'</td></tr>').join('')+'</tbody></table>':'<p style="color:var(--t3);padding:8px">未找到低位标的</p>')+'</div>'}).join('');}

function toast(msg,type){const e=document.createElement('div');e.className='toast '+type;e.textContent=msg;document.getElementById('toast').appendChild(e);setTimeout(()=>e.remove(),5000)}
document.addEventListener('DOMContentLoaded',()=>{
  const st=document.getElementById('st');
  function doScan(){
    if(isTrading()){scan();}
    else{
      st.textContent='○ 盘后（保留最后扫描结果）';st.className='status dead';
      document.getElementById('si').textContent='等待开盘 · 交易日9:00-11:30,13:00-15:00';
    }
  }
  st.textContent='⏳ 首次扫描...';doScan();setInterval(doScan,30000);
});
</script>
